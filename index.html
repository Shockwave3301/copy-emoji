<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copy Emoji</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      Because I don't want to give you all my data to copy a damn emoji

    <div id="grid" hidden></div>
